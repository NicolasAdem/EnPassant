{% extends "base.html" %}
{% block title %}EnPassant · Join a tournament{% endblock %}

{% block content %}
<div class="page page-join">

  <header class="join-header">
    <a href="/" class="brand brand-logo-only" aria-label="EnPassant home">
      <img src="/static/img/logo.svg" alt="EnPassant" class="brand-logo">
    </a>
    <a href="/new" class="header-link">
      Hosting? <span class="accent">Create a tournament →</span>
    </a>
  </header>

  <main class="join-main">
    <!-- Background image, sits behind everything else. Missing image = clean dark bg. -->
    <div class="join-bg" aria-hidden="true">
      <img src="/static/img/hero-board.jpg" alt="" onerror="this.parentElement.style.display='none'">
    </div>

    <section class="join-hero">
      <h1 class="join-headline">
        Enter your code<br>
        <em class="accent">to join the room.</em>
      </h1>

      <form id="join-form" class="join-form" autocomplete="off">
        <label for="tcode" class="visually-hidden">Tournament code</label>
        <input
          type="text"
          id="tcode"
          inputmode="latin"
          autocapitalize="characters"
          autocomplete="off"
          spellcheck="false"
          maxlength="6"
          placeholder="A4K2P9"
          aria-label="Six-character tournament code"
          autofocus
        >
        <button class="btn btn-primary btn-lg" type="submit">
          Join <span aria-hidden="true">→</span>
        </button>
      </form>

      <div class="join-or">
        <img src="/static/img/qr-illustration.svg" alt="" class="join-or-icon" onerror="this.style.display='none'">
        <span>or scan the QR code on the host's screen</span>
      </div>
    </section>
  </main>

</div>
{% endblock %}

{% block scripts %}
<script>
const codeInput = document.getElementById('tcode');

// Auto-uppercase as the user types, keep the caret behaviour sensible.
codeInput.addEventListener('input', (e) => {
  const start = e.target.selectionStart;
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  e.target.setSelectionRange(start, start);
});

// Auto-submit the moment a full 6-character code is entered.
codeInput.addEventListener('input', (e) => {
  if (e.target.value.length === 6) {
    document.getElementById('join-form').requestSubmit();
  }
});

document.getElementById('join-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const code = codeInput.value.trim().toUpperCase();
  if (code.length < 4) {
    EP.toast('Codes are 6 characters.', 'error');
    return;
  }
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  try {
    await EP.api('GET', `/api/tournaments/${code}`);
    location.href = `/join/${code}`;
  } catch (err) {
    EP.toast('No tournament with that code.', 'error');
    btn.disabled = false;
    codeInput.select();
  }
});
</script>
{% endblock %}
