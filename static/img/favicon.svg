<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="EnPassant">
  <!-- Dark rounded background so the rook reads on a light browser tab -->
  <rect width="64" height="64" rx="12" fill="#07100c"/>
  <g transform="translate(12 8)">
    <!-- Crenellations -->
    <rect x="0"  y="0"  width="10" height="12" fill="#e8f2ec"/>
    <rect x="15" y="0"  width="10" height="12" fill="#e8f2ec"/>
    <rect x="30" y="0"  width="10" height="12" fill="#e8f2ec"/>
    <!-- Neck -->
    <rect x="4"  y="12" width="32" height="6"  fill="#e8f2ec"/>
    <!-- Body -->
    <rect x="2"  y="18" width="36" height="24" fill="#e8f2ec"/>
    <!-- Base step -->
    <rect x="0"  y="42" width="40" height="6"  fill="#e8f2ec"/>
    <!-- Lime signal line -->
    <rect x="0"  y="50" width="40" height="2"  fill="#b8ff5c"/>
    <!-- Spark notch -->
    <rect x="32" y="2"  width="6"  height="3"  fill="#b8ff5c"/>
  </g>
</svg>
