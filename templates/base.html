<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}EnPassant{% endblock %}</title>
  <meta name="description" content="EnPassant — live chess tournaments for the room. Animated leaderboards, dual-confirmation scoring, projector mode.">
  <meta name="theme-color" content="#07100c">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>♟</text></svg>">
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block content %}{% endblock %}
  <script src="/static/js/common.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
